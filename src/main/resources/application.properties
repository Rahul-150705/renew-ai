# Server Configuration
server.port=${PORT:8080}

# Neon DB Configuration (loaded from .env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Handle Neon.tech cold starts (DB wakes from sleep)
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration (loaded from .env)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Scheduler Configuration (Run daily at 9:00 AM)
renewal.scheduler.cron=0 0 9 * * ?

# Twilio Configuration (loaded from .env)
twilio.enabled=${TWILIO_ENABLED:false}
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:}

# Logging
logging.level.com.renewai=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.data.redis=DEBUG

# CORS (loaded from .env)
allowed.origins=${ALLOWED_ORIGINS:https://client-connect-hub-zeta.vercel.app}

# Allow bean overriding (Fix for duplicate beans in nested project folder)
spring.main.allow-bean-definition-overriding=true

# Redis Cache Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.cache.type=redis

# Groq API Configuration
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.1-8b-instant}