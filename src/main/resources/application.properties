# Server Configuration
server.port=8080

# Neon DB Configuration (loaded from .env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (loaded from .env)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Scheduler Configuration (Run daily at 9:00 AM)
renewal.scheduler.cron=0 0 9 * * ?

# Twilio Configuration (loaded from .env)
twilio.enabled=false
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:}

# Logging
logging.level.com.renewai=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS (loaded from .env)
allowed.origins=${ALLOWED_ORIGINS}